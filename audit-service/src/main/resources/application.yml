server:
  port: ${SERVER_PORT:8085}
spring:
  application:
    name: audit-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/audit_db}
    username: ${DB_USER:finguard}
    password: ${DB_PASSWORD:finguard}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
security:
  jwt:
    secret: ${JWT_SECRET:change-this-demo-secret-to-at-least-32-characters}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
