server:
  port: ${SERVER_PORT:8083}
spring:
  application:
    name: transaction-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/transaction_db}
    username: ${DB_USER:finguard}
    password: ${DB_PASSWORD:finguard}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: com.finguard.events
    producer:
      acks: all
      properties:
        enable.idempotence: true
security:
  jwt:
    secret: ${JWT_SECRET:change-this-demo-secret-to-at-least-32-characters}
  internal-token: ${INTERNAL_SERVICE_TOKEN:change-this-internal-service-token}
clients:
  account-service:
    base-url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
