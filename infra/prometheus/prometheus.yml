global:
  scrape_interval: 10s
scrape_configs:
  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs: [{ targets: ['auth-service:8081'] }]
  - job_name: account-service
    metrics_path: /actuator/prometheus
    static_configs: [{ targets: ['account-service:8082'] }]
  - job_name: transaction-service
    metrics_path: /actuator/prometheus
    static_configs: [{ targets: ['transaction-service:8083'] }]
  - job_name: fraud-service
    metrics_path: /actuator/prometheus
    static_configs: [{ targets: ['fraud-service:8084'] }]
  - job_name: audit-service
    metrics_path: /actuator/prometheus
    static_configs: [{ targets: ['audit-service:8085'] }]

  - job_name: investigation-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["investigation-service:8086"]
