server:
  port: ${SERVER_PORT:8084}
spring:
  application:
    name: fraud-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fraud_db}
    username: ${DB_USER:finguard}
    password: ${DB_PASSWORD:finguard}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      acks: all
      properties:
        enable.idempotence: true
security:
  jwt:
    secret: ${JWT_SECRET:change-this-demo-secret-to-at-least-32-characters}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
