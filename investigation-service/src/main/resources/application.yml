server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: investigation-service

security:
  jwt:
    secret: ${JWT_SECRET:change-this-demo-secret-to-at-least-32-characters}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:}
  base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
