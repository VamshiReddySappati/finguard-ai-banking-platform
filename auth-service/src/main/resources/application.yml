server:
  port: ${SERVER_PORT:8081}
spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USER:finguard}
    password: ${DB_PASSWORD:finguard}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
security:
  jwt:
    secret: ${JWT_SECRET:change-this-demo-secret-to-at-least-32-characters}
    expiration-minutes: 120
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
springdoc:
  swagger-ui:
    path: /swagger-ui.html
