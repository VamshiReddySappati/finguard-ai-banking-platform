name: finguard-ai

x-service-environment: &service-environment
  JWT_SECRET: ${JWT_SECRET:-change-this-demo-secret-to-at-least-32-characters}
  INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-change-this-internal-service-token}
  DB_USER: ${POSTGRES_USER:-finguard}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-finguard}

x-java-service: &java-service
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_healthy
  networks: [finguard]

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finguard}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [finguard]

  kafka:
    image: apache/kafka:4.3.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 8s
      timeout: 8s
      retries: 20
    networks: [finguard]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redis-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [finguard]

  auth-service:
    <<: *java-service
    build:
      context: .
      dockerfile: docker/java-service.Dockerfile
      args: { MODULE: auth-service }
    environment:
      <<: *service-environment
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/auth_db
    expose: ["8081"]

  account-service:
    <<: *java-service
    build:
      context: .
      dockerfile: docker/java-service.Dockerfile
      args: { MODULE: account-service }
    environment:
      <<: *service-environment
      SERVER_PORT: 8082
      DB_URL: jdbc:postgresql://postgres:5432/account_db
    expose: ["8082"]

  transaction-service:
    <<: *java-service
    build:
      context: .
      dockerfile: docker/java-service.Dockerfile
      args: { MODULE: transaction-service }
    environment:
      <<: *service-environment
      SERVER_PORT: 8083
      DB_URL: jdbc:postgresql://postgres:5432/transaction_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ACCOUNT_SERVICE_URL: http://account-service:8082
    expose: ["8083"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      account-service: { condition: service_started }

  fraud-service:
    <<: *java-service
    build:
      context: .
      dockerfile: docker/java-service.Dockerfile
      args: { MODULE: fraud-service }
    environment:
      <<: *service-environment
      SERVER_PORT: 8084
      DB_URL: jdbc:postgresql://postgres:5432/fraud_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
    expose: ["8084"]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      redis: { condition: service_healthy }

  audit-service:
    <<: *java-service
    build:
      context: .
      dockerfile: docker/java-service.Dockerfile
      args: { MODULE: audit-service }
    environment:
      <<: *service-environment
      SERVER_PORT: 8085
      DB_URL: jdbc:postgresql://postgres:5432/audit_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    expose: ["8085"]


  investigation-service:
    restart: unless-stopped
    build:
      context: .
      dockerfile: docker/java-service.Dockerfile
      args: { MODULE: investigation-service }
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-this-demo-secret-to-at-least-32-characters}
      SERVER_PORT: 8086
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    expose: ["8086"]
    networks: [finguard]

  edge-gateway:
    build:
      context: .
      dockerfile: edge-gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - auth-service
      - account-service
      - transaction-service
      - fraud-service
      - audit-service
      - investigation-service
    networks: [finguard]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]
    networks: [finguard]

  grafana:
    image: grafana/grafana:12.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["3001:3000"]
    depends_on: [prometheus]
    networks: [finguard]

networks:
  finguard:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  grafana-data:
